name: edusys_mobile
description: EduSys mobile attendance app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.2
  device_info_plus: ^11.1.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.3
  flutter_webrtc: ^1.3.0
  file_picker: ^8.1.7
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo/app_logo_icon_clean.png
  adaptive_icon_foreground: assets/logo/app_logo_icon_clean.png
  adaptive_icon_background: "#00000000"
  remove_alpha_ios: false

flutter:
  uses-material-design: true

